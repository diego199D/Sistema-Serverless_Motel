<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar día | Motel Mil Amores</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="light-mode">
    <header>
        <button id="menu-toggle" class="hamburger">☰</button>
        <h1>Consultar día</h1>
        <button id="theme-toggle">🌗</button>
    </header>

    <div id="drawer" class="drawer">
        <nav>
            <a class="nav-btn" href="index.html">📋  Planilla</a>
            <a class="nav-btn" href="calculadora/calculadora.html">🕘  Calculadora</a>
            <a class="nav-btn active" href="consultar-dia.html">⛅  Consultar día</a>
            <a class="nav-btn" href="gestion.html">📄  Gestionar historial</a>
            <a class="nav-btn" href="reportes.html">📊  Reportes</a>
            <a class="nav-btn" href="pago.html">💵  Pago QR</a>
        </nav>
    </div>
    <div id="overlay" class="overlay"></div>

    <main class="tab-content active">
        <section class="ingreso-form">
            <h3 id="titulo-fecha-consulta">Cargando...</h3>
            <div style="display:flex;gap:10px;justify-content:flex-end;">
                <button onclick="exportarPDFConsultar()" class="btn btn-accent" id="btn-pdf-consultar" style="display:none">Exportar PDF</button>
            </div>
        </section>
        <div id="resultado-consulta"></div>
    </main>

    <!-- Modal editar registro del día -->
    <dialog id="modalEditarDia">
        <div class="modal-content">
            <h3>Editar Registro</h3>
            <input type="hidden" id="edia-id">
            <label>Hora Entrada:</label>
            <div class="time-ampm-row">
                <input type="number" id="edia-entrada-h" min="1" max="12" placeholder="HH" class="time-input">
                <span class="time-sep">:</span>
                <input type="number" id="edia-entrada-m" min="0" max="59" placeholder="MM" class="time-input">
                <select id="edia-entrada-ampm" class="ampm-select">
                    <option>AM</option>
                    <option>PM</option>
                </select>
            </div>
            <label>Hora Salida:</label>
            <div class="time-ampm-row">
                <input type="number" id="edia-salida-h" min="1" max="12" placeholder="HH" class="time-input">
                <span class="time-sep">:</span>
                <input type="number" id="edia-salida-m" min="0" max="59" placeholder="MM" class="time-input">
                <select id="edia-salida-ampm" class="ampm-select">
                    <option>AM</option>
                    <option>PM</option>
                </select>
            </div>
            <label>Total (bs):</label>
            <input type="number" id="edia-total" step="0.01">
            <button onclick="guardarEdicionDia()" class="btn btn-primary">GUARDAR</button>
            <button onclick="document.getElementById('modalEditarDia').close()" class="btn">Cancelar</button>
        </div>
    </dialog>

    <script src="app.js?v=2"></script>
</body>
</html>
