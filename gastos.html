<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos | Motel Mil Amores</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="light-mode">
    <header>
        <button id="menu-toggle" class="hamburger">☰</button>
        <h1>Gastos del Motel</h1>
        <button id="theme-toggle">🌗</button>
    </header>

    <div id="drawer" class="drawer">
        <nav>
            <a class="nav-btn" href="dashboard.html">📊  Dashboard</a>
            <a class="nav-btn" href="index.html">📋  Planilla</a>
            <a class="nav-btn" href="calculadora/calculadora.html">🕘  Calculadora</a>
            <a class="nav-btn" href="consultar-dia.html">⛅  Consultar día</a>
            <a class="nav-btn" href="gestion.html">📄  Gestionar historial</a>
            <a class="nav-btn active" href="gastos.html">💸  Gastos</a>
            <a class="nav-btn" href="reportes.html">📆  Reportes</a>
            <a class="nav-btn" href="pago.html">💵  Pago QR</a>            
            <br><br><br><br>
            <button class="btn-cerrar-sesion" onclick="cerrarSesion()">
                🚪 Cerrar Sesion
            </button>
        </nav>
    </div>
    <div id="overlay" class="overlay"></div>

    <main>
        <!-- Selector de fecha -->
        <section class="ingreso-form">
            <h3>Mes a consultar</h3>
            <div style="display:flex; gap:10px;">
                <input type="date" id="fecha-gastos" class="time-input" style="flex:1; width:auto; font-size:1rem; text-align:left; padding:12px 14px;">
                <button onclick="cargarGastos()" class="btn btn-primary" style="flex:0 0 auto; padding:12px 20px; font-size:0.85rem;">Ver mes</button>
            </div>
        </section>

        <!-- Formulario nuevo gasto -->
        <section class="ingreso-form">
            <h3>Anotar Nuevo Gasto</h3>
            <div class="gastos-form-grid">
                <div class="gasto-field">
                    <label class="gasto-label">📝 Nombre del gasto</label>
                    <input type="text" id="gasto-nombre" class="gasto-input nombre-color" placeholder="Ej: Agua, detergente, Pintura...">
                </div>
                <div class="gasto-field">
                    <label class="gasto-label">💰 Precio (Bs)</label>
                    <input type="number" id="gasto-precio" class="gasto-input precio-color" placeholder="0.00" step="0.01" min="0">
                </div>
                <button onclick="agregarGasto()" class="btn-zaz-gasto">➕ REGISTRAR GASTO</button>
            </div>
        </section>

        <!-- Tabla resultados -->
        <div id="resultado-gastos"></div>
    </main>

    <dialog id="modalEditarGasto">
        <div class="modal-content">
            <h3>Editar Gasto</h3>
            <input type="hidden" id="egasto-id">

            <label>Nombre del gasto:</label>
            <input type="text" id="egasto-nombre" style="width:100%;padding:13px 16px;background:var(--bg2);border:1.5px solid var(--border-vivid);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:1rem;font-weight:600;outline:none;margin-bottom:4px;">

            <label>Precio (Bs):</label>
            <input type="number" id="egasto-precio" step="0.01" min="0" style="width:100%;padding:13px 16px;background:var(--bg2);border:1.5px solid var(--border-vivid);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:1rem;font-weight:600;outline:none;margin-bottom:4px;">

            <label>Fecha:</label>
            <input type="date" id="egasto-fecha" style="width:100%;padding:13px 16px;background:var(--bg2);border:1.5px solid var(--border-vivid);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:1rem;font-weight:600;outline:none;margin-bottom:10px;">

            <div style="display:flex;gap:10px;margin-top:15px;">
                <button onclick="guardarEdicionGasto()" class="btn btn-primary">GUARDAR</button>
                <button onclick="document.getElementById('modalEditarGasto').close()" class="btn">Cancelar</button>
            </div>
        </div>
    </dialog>
    <script src="app.js?v=2"></script>
</body>
</html>
